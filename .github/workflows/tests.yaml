name: Tests

on:
  pull_request: ~
  push: ~
  schedule:
    - cron: '0 9 * * 5'

jobs:
  run:
    runs-on: ${{ matrix.operating-system }}
    services:
      db:
        image: mysql:8
        env:
          MYSQL_DATABASE: ${{ env.DB_NAME }}
          MYSQL_USER: ${{ env.DB_USER }}
          MYSQL_PASSWORD: ${{ env.DB_PASS }}
          MYSQL_ROOT_PASSWORD: rootpassword
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    strategy:
      matrix:
        operating-system: [ubuntu-latest]
        php-versions: ['7.4', '8.0', '8.1', '8.2', '8.3', '8.4']
        experimental: [false]
      fail-fast: false
    name: PHP ${{ matrix.php-versions }} @ ${{ matrix.operating-system }}
    env:
      DB_NAME: test_db
      DB_USER: test_user
      DB_PASS: test_password
    steps:
      - name: Checkout
        uses: actions/checkout@master

      - name: Install PHP
        uses: shivammathur/setup-php@master
        with:
          php-version: ${{ matrix.php-versions }}
          tools: 'composer:v2'
          ini-values: error_reporting=E_ALL
          extensions: mbstring

      - name: Install dependencies
        run: composer update --ignore-platform-req=php --prefer-dist --no-progress --no-suggest

      - name: Install MySQL client
        run: sudo apt-get update && sudo apt-get install -y default-mysql-client

      - name: Wait for MySQL to be ready
        run: |
          for i in {1..30}; do
            mysqladmin ping -h127.0.0.1 -P3306 -u${{ env.DB_USER }} -p${{ env.DB_PASS }} >/dev/null 2>&1 && break
            echo "Waiting for MySQL..."
            sleep 2
          done

      - name: Run test.sql
        run: mysql -h127.0.0.1 -P3306 -u${{ env.DB_USER }} -p${{ env.DB_PASS }} < tests/data/test.sql

      - name: Run the tests
        run: composer run tests

